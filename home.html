<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flo Lite: Home</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" href="https://code.getmdl.io/1.3.0/material.indigo-pink.min.css">
    <script defer src="https://code.getmdl.io/1.3.0/material.min.js"></script>
    <style>
        /* Exact Flo Lite Styles */
        .mdl-layout__header { background-color: #3F51B5 !important; }
        .android-header-spacer { flex-grow: 1; }
        
        /* Accordion (Sanfona) Styling */
        .accordion-item { border-bottom: 1px solid #e0e0e0; background: white; }
        .accordion-header { 
            padding: 16px; 
            font-size: 16px; 
            cursor: pointer; 
            display: flex; 
            justify-content: space-between;
            align-items: center;
            font-weight: 400;
        }
        .accordion-header:hover { background-color: #f5f5f5; }
        .accordion-content { 
            max-height: 0; 
            overflow: hidden; 
            transition: max-height 0.3s ease-in-out; 
            background: #fafafa; 
        }
        .accordion-content.open { max-height: 1000px; }

        /* Table inside Accordion */
        .dept-table { width: 100%; border: none; margin-bottom: 0; }
        .dept-table td { 
            text-align: left !important; 
            padding: 12px 24px !important; 
            border-top: 1px solid #eee;
            cursor: pointer;
        }
        .dept-table tr:hover { background-color: #eeeeee; }
        
        .network-stats { padding-left:10px; font-size:10px; color: white; line-height: 1.2; }
    </style>
</head>
<body>
    <div class="mdl-layout mdl-js-layout mdl-layout--fixed-header">
        <header class="mdl-layout__header">
            <div class="mdl-layout__header-row">
                <span class="mdl-layout__title">floLite-Home</span>
                <div class="android-header-spacer"></div>
                <div class="network-stats">
                    <span id="speed">8.25 mbps</span><br><span id="latency">150 ms</span>
                </div>
                <div class="android-header-spacer"></div>
                <nav class="mdl-navigation">
                    <a class="mdl-navigation__link" href="warehouse.html" id="active-wh">Loading...</a>
                    <a class="mdl-navigation__link" href="#" id="logout-btn">Logout</a>
                </nav>
            </div>
        </header>

        <main class="mdl-layout__content">
            <div id="dynamic-menu-container">
                <div style="text-align: center; padding: 20px;">Loading Departments...</div>
            </div>
        </main>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
